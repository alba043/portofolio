name: Deploy to gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish dist to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads "$remote_url" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$remote_url" pages
          else
            mkdir pages
            git -C pages init -b gh-pages
            git -C pages remote add origin "$remote_url"
          fi

          rsync -a --delete --exclude ".git" dist/ pages/
          touch pages/.nojekyll

          git -C pages add -A
          if git -C pages diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi

          git -C pages commit -m "Deploy ${GITHUB_SHA}"
          git -C pages push origin gh-pages
